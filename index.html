<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Балда 3x3 — игра на доверии</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        /* карточка игры */
        .game-container {
            max-width: 500px;
            width: 100%;
            background: #fef9e6;
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,200,0.6);
            overflow: hidden;
            padding: 20px 16px 30px;
            transition: all 0.2s;
        }

        /* заголовок */
        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .game-header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #ffd966;
            text-shadow: 3px 3px 0 #7a2e19;
            font-weight: 800;
        }
        .game-header p {
            margin: 6px 0 0;
            color: #3b2a1f;
            font-weight: bold;
            background: #fff0c0;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
        }

        /* имена и статус */
        .players-panel {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }
        .player-card {
            background: #efe3c9;
            border-radius: 48px;
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05), 0 5px 8px rgba(0,0,0,0.1);
            transition: 0.1s linear;
        }
        .player-card.active-turn {
            background: #ffecb3;
            box-shadow: 0 0 0 3px #f7b32b, 0 6px 12px rgba(0,0,0,0.2);
        }
        .player-name {
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .player-name input {
            font-weight: bold;
            font-size: 1rem;
            width: 90px;
            text-align: center;
            background: #fffaf0;
            border: 1px solid #cbad7a;
            border-radius: 40px;
            padding: 4px 0;
            font-family: inherit;
        }
        .player-score {
            font-size: 1.8rem;
            font-weight: 800;
            color: #b45309;
            margin-top: 4px;
        }
        .turn-badge {
            font-size: 0.7rem;
            background: #f7b32b;
            color: #2c1a0c;
            border-radius: 30px;
            padding: 2px 10px;
            display: inline-block;
            margin-top: 6px;
        }

        /* игровое поле 3x3 (сетка) */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            aspect-ratio: 1 / 1;
            gap: 12px;
            background-color: #d9b48b;
            padding: 16px;
            border-radius: 48px;
            margin: 12px 0 20px;
            box-shadow: inset 0 0 0 2px #fcf3da, inset 0 0 0 6px #bc8f6b, 0 12px 24px rgba(0,0,0,0.3);
        }

        .cell {
            background: #fff6e8;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 800;
            font-family: monospace;
            color: #2e241f;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #aa7e58;
            transition: 0.05s linear;
            cursor: pointer;
            touch-action: manipulation;
            aspect-ratio: 1 / 1;
        }
        .cell.selected-path {
            background: #cbe6fe;
            box-shadow: 0 0 0 3px #2c7da0;
            transform: scale(0.97);
        }
        .cell.empty-cell {
            background: #f0e2cd;
            color: #bc9a76;
            font-size: 2rem;
            font-weight: normal;
        }
        .cell.filled-cell {
            background: #fff2df;
        }

        /* зона выбора слова */
        .word-area {
            background: #e9dccd;
            border-radius: 60px;
            padding: 12px 16px;
            margin: 8px 0 12px;
            text-align: center;
        }
        .current-word {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 6px;
            background: white;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 48px;
            font-family: monospace;
            color: #3c2a23;
            margin: 8px auto;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.05);
        }
        .word-hint {
            font-size: 0.75rem;
            color: #5a3e2a;
        }

        /* кнопки */
        .action-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin: 12px 0 8px;
        }
        .btn {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 60px;
            background: #f3d382;
            color: #3b2a1f;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #a7692e;
            flex: 1;
            text-align: center;
            font-family: inherit;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a7692e;
        }
        .btn-primary {
            background: #f0b27a;
            color: #2c1a0c;
            font-weight: bold;
        }
        .btn-reset {
            background: #cdb28b;
            box-shadow: 0 4px 0 #7a5d3c;
        }
        .used-words {
            background: #fff2e0;
            border-radius: 28px;
            padding: 12px;
            margin-top: 18px;
            font-size: 0.75rem;
            max-height: 110px;
            overflow-y: auto;
        }
        .used-title {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }
        .word-badge {
            display: inline-block;
            background: #d9c2a7;
            padding: 3px 12px;
            border-radius: 40px;
            margin: 3px 5px;
            font-size: 0.75rem;
            font-family: monospace;
        }
        .info-message {
            background: #37322b;
            color: #ffe1a0;
            text-align: center;
            border-radius: 32px;
            padding: 6px;
            font-size: 0.7rem;
            margin: 10px 0 0;
        }
        @media (max-width: 480px) {
            .cell {
                font-size: 1.8rem;
            }
            .current-word {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }
            .player-name input {
                width: 70px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="game-header">
        <h1>БАЛДА 3×3</h1>
        <p>✍️ честная игра на доверии ✍️</p>
    </div>

    <div class="players-panel">
        <div class="player-card" id="player1Card">
            <div class="player-name">
                <span>👤</span>
                <input type="text" id="p1Name" maxlength="12" placeholder="Игрок 1" value="Игрок А">
            </div>
            <div class="player-score" id="p1Score">0</div>
            <div class="turn-badge" id="p1TurnBadge"></div>
        </div>
        <div class="player-card" id="player2Card">
            <div class="player-name">
                <span>👤</span>
                <input type="text" id="p2Name" maxlength="12" placeholder="Игрок 2" value="Игрок Б">
            </div>
            <div class="player-score" id="p2Score">0</div>
            <div class="turn-badge" id="p2TurnBadge"></div>
        </div>
    </div>

    <!-- поле 3x3 -->
    <div class="board" id="board"></div>

    <div class="word-area">
        <div class="word-hint">📱 веди пальцем по буквам (соседние клетки)</div>
        <div class="current-word" id="currentWordDisplay">———</div>
        <div class="word-hint">✨ слово должно содержать НОВУЮ букву ✨</div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-primary" id="submitWordBtn">✅ ПОДТВЕРДИТЬ СЛОВО</button>
        <button class="btn btn-reset" id="clearPathBtn">🗑️ Очистить</button>
    </div>

    <div class="used-words" id="usedWordsPanel">
        <div class="used-title">📖 Использованные слова (повторять нельзя):</div>
        <div id="usedWordsList">— пока нет —</div>
    </div>
    <div class="info-message" id="infoMsg">
        🔥 Игроки по очереди: добавить 1 букву → провести слово → подтвердить
    </div>
</div>

<script>
    // ---------- ИНИЦИАЛИЗАЦИЯ ПОЛЯ (3x3) ----------
    // начальная сетка: центр - буква 'Л', 'Е', 'С'? нет, слово ЛЕС из трёх клеток центрального ряда
    // по правилам классической балды на 3x3 чаще центральное слово занимает среднюю строку: [0,1] [1,1] [2,1] или горизонталь.
    // Чтобы игра была логичной: расположим слово "ЛЕС" в центральной горизонтали: (1,0) = Л, (1,1) = Е, (1,2) = С
    // остальные клетки пустые.
    const ROWS = 3;
    const COLS = 3;
    // буквы на поле: null = пусто
    let grid = [
        [null, null, null],
        [null, null, null],
        [null, null, null]
    ];
    // начальное слово ЛЕС в центре строки 1 (индексация 0)
    grid[1][0] = 'Л';
    grid[1][1] = 'Е';
    grid[1][2] = 'С';

    // ---------- Глобальное состояние игры ----------
    let currentPlayer = 0;           // 0 - игрок1, 1 - игрок2
    let scores = [0, 0];
    let usedWordsSet = new Set();     // все слова (верхний регистр) которые уже были сыграны
    let allCellsFilled = false;       // флаг заполнения всех клеток

    // Временное состояние для построения слова (выбор пути)
    let selectedCells = [];            // массив {row, col}
    let lastPlacedLetterPos = null;    // {row, col} позиция новой буквы, добавленной в этом ходу
    let freeLettersLeft = 0;           // сколько свободных пустых клеток (несчитаем занятые)
    
    // DOM элементы
    const boardEl = document.getElementById('board');
    const p1ScoreEl = document.getElementById('p1Score');
    const p2ScoreEl = document.getElementById('p2Score');
    const p1Card = document.getElementById('player1Card');
    const p2Card = document.getElementById('player2Card');
    const p1TurnBadge = document.getElementById('p1TurnBadge');
    const p2TurnBadge = document.getElementById('p2TurnBadge');
    const currentWordDisplay = document.getElementById('currentWordDisplay');
    const usedWordsListDiv = document.getElementById('usedWordsList');
    const infoMsgDiv = document.getElementById('infoMsg');
    const submitBtn = document.getElementById('submitWordBtn');
    const clearBtn = document.getElementById('clearPathBtn');

    // для получения имён
    const p1NameInput = document.getElementById('p1Name');
    const p2NameInput = document.getElementById('p2Name');

    // обновление отображения очков и активного игрока
    function updateUI_players() {
        p1ScoreEl.innerText = scores[0];
        p2ScoreEl.innerText = scores[1];
        const active = currentPlayer;
        if (active === 0) {
            p1Card.classList.add('active-turn');
            p2Card.classList.remove('active-turn');
            p1TurnBadge.innerText = '🔴 ХОД';
            p2TurnBadge.innerText = '';
        } else {
            p2Card.classList.add('active-turn');
            p1Card.classList.remove('active-turn');
            p2TurnBadge.innerText = '🔴 ХОД';
            p1TurnBadge.innerText = '';
        }
    }

    // отображение списка использованных слов
    function updateUsedWordsList() {
        if (usedWordsSet.size === 0) {
            usedWordsListDiv.innerHTML = '— пока нет —';
            return;
        }
        let html = '';
        const arr = Array.from(usedWordsSet);
        arr.sort();
        arr.forEach(w => {
            html += `<span class="word-badge">${w}</span>`;
        });
        usedWordsListDiv.innerHTML = html;
    }

    // проверка, можно ли добавить новую букву в позицию (row,col) — только если клетка пустая и соседствует хотя бы с одной занятой буквой
    function isValidNewLetterPosition(row, col) {
        if (grid[row][col] !== null) return false; // уже занято
        
        // соседи (вверх/вниз/влево/вправо)
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        for (let [dr, dc] of dirs) {
            const nr = row + dr, nc = col + dc;
            if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && grid[nr][nc] !== null) {
                return true;
            }
        }
        return false;
    }

    // получить все доступные для добавления буквы клетки (пустые и имеющие соседа-букву)
    function getAvailableForLetterCells() {
        let available = [];
        for (let i=0;i<ROWS;i++) {
            for (let j=0;j<COLS;j++) {
                if (grid[i][j] === null && isValidNewLetterPosition(i,j)) {
                    available.push({row:i, col:j});
                }
            }
        }
        return available;
    }

    // проверка: может ли игрок сейчас добавить букву (и есть ли свободные клетки)
    function canAddLetter() {
        if (allCellsFilled) return false;
        const available = getAvailableForLetterCells();
        return available.length > 0;
    }

    // Начать новый ход (сброс выбранного пути и ожидание добавления буквы)
    function resetTurnSelection() {
        selectedCells = [];
        lastPlacedLetterPos = null;
        renderBoard(); // обновим подсветку
        updateCurrentWordDisplay();
        // снимаем любые выделения
    }

    // отрисовка поля с подсветкой выбранного пути
    function renderBoard() {
        boardEl.innerHTML = '';
        for (let i=0;i<ROWS;i++) {
            for (let j=0;j<COLS;j++) {
                const letter = grid[i][j];
                const cellDiv = document.createElement('div');
                cellDiv.classList.add('cell');
                const isSelected = selectedCells.some(sel => sel.row === i && sel.col === j);
                if (isSelected) {
                    cellDiv.classList.add('selected-path');
                }
                if (letter === null) {
                    cellDiv.classList.add('empty-cell');
                    cellDiv.innerText = '?';
                } else {
                    cellDiv.classList.add('filled-cell');
                    cellDiv.innerText = letter;
                }
                // обработка клика/тапа
                cellDiv.addEventListener('click', (function(row, col) {
                    return function() { onCellTap(row, col); };
                })(i, j));
                boardEl.appendChild(cellDiv);
            }
        }
    }

    // обработка касания клетки
    function onCellTap(row, col) {
        if (allCellsFilled) {
            showMessage('🏆 Игра окончена! Все клетки заполнены. Нажмите "Сброс игры"', 1500);
            return;
        }
        const letter = grid[row][col];
        const isFreeCell = (letter === null);
        
        // Сценарий 1: если ещё не добавлена новая буква в этом ходу
        if (lastPlacedLetterPos === null) {
            // можно добавить новую букву только в пустую допустимую клетку
            if (!isFreeCell) {
                showMessage('❌ Сначала добавьте новую букву в пустую клетку (соседнюю с буквами)', 1200);
                return;
            }
            if (!isValidNewLetterPosition(row, col)) {
                showMessage('⚠️ Букву можно ставить только рядом с существующими буквами (по горизонтали/вертикали)!', 1200);
                return;
            }
            // запрашиваем букву у игрока (через prompt)
            let newLetter = prompt(`Игрок ${getCurrentPlayerName()}, введите ОДНУ заглавную русскую букву:`, 'А');
            if (!newLetter || newLetter.length === 0) return;
            newLetter = newLetter.trim().toUpperCase();
            if (!/^[А-ЯЁ]$/.test(newLetter)) {
                showMessage('❗ Введите одну русскую букву (А-Я, Ё)', 1000);
                return;
            }
            // ставим букву
            grid[row][col] = newLetter;
            lastPlacedLetterPos = { row, col };
            // начинаем путь с этой клетки
            selectedCells = [{ row, col }];
            renderBoard();
            updateCurrentWordDisplay();
            showMessage(`➕ Добавлена буква "${newLetter}". Теперь проведите слово (нажимайте соседние клетки)`, 1500);
            return;
        }
        
        // Сценарий 2: буква уже добавлена, строим путь (выбираем слово)
        // нельзя нажимать на пустые клетки, только на клетки с буквами
        if (isFreeCell) {
            showMessage('🔁 В слове можно использовать только клетки c буквами', 800);
            return;
        }
        
        // проверка: клетка уже есть в текущем пути?
        const alreadyIndex = selectedCells.findIndex(c => c.row === row && c.col === col);
        if (alreadyIndex !== -1) {
            // если это последняя клетка - ничего не делаем, если предыдущая - можно сократить?
            if (alreadyIndex === selectedCells.length-1) return; // уже последняя
            // если это начало или середина -> обрезаем путь до этой клетки
            if (alreadyIndex === 0 && selectedCells.length > 1) {
                // если нажали на первую клетку пути, то можно сбросить до первой (не меняем)
                // но ничего страшного не делаем
            }
            selectedCells = selectedCells.slice(0, alreadyIndex+1);
            renderBoard();
            updateCurrentWordDisplay();
            return;
        }
        
        // проверка соседства с последней клеткой пути
        const last = selectedCells[selectedCells.length-1];
        const dx = Math.abs(last.row - row);
        const dy = Math.abs(last.col - col);
        const isAdjacent = (dx + dy === 1);
        if (!isAdjacent) {
            showMessage('❌ Можно ходить только в соседнюю клетку (вверх/вниз/влево/вправо)', 800);
            return;
        }
        
        // добавляем новую клетку в путь
        selectedCells.push({ row, col });
        renderBoard();
        updateCurrentWordDisplay();
    }
    
    // получить текущее составленное слово из выбранного пути
    function getCurrentWordFromPath() {
        if (selectedCells.length === 0) return '';
        let word = '';
        for (let cell of selectedCells) {
            const ch = grid[cell.row][cell.col];
            if (ch !== null) word += ch;
            else return '';
        }
        return word;
    }
    
    function updateCurrentWordDisplay() {
        const word = getCurrentWordFromPath();
        if (word === '') currentWordDisplay.innerText = '———';
        else currentWordDisplay.innerText = word;
    }
    
    // проверка валидности хода: слово существует (без базы данных, на доверии), но должно содержать новую букву, не повторяться, минимальная длина 2
    function validateWord(word, newLetterPos) {
        if (word.length < 2) {
            showMessage('❌ Слово должно быть длиной хотя бы 2 буквы', 1200);
            return false;
        }
        // должно включать хотя бы раз новую букву (которая только что добавлена)
        const newLetter = grid[newLetterPos.row][newLetterPos.col];
        if (!word.includes(newLetter)) {
            showMessage(`⚠️ Слово должно включать новую букву "${newLetter}"!`, 1300);
            return false;
        }
        // проверка уникальности слова (регистр)
        if (usedWordsSet.has(word)) {
            showMessage(`🚫 Слово "${word}" уже было использовано! Нельзя повторять.`, 1400);
            return false;
        }
        // В этой версии база не нужна, игра на доверии — все существительные нарицательные проверяют игроки сами.
        // Дополнительно можно дать рекомендацию, но не блокируем.
        return true;
    }
    
    // подтверждение слова
    function confirmWord() {
        if (allCellsFilled) {
            showMessage('Игра завершена, сбросьте для новой партии', 1000);
            return;
        }
        if (lastPlacedLetterPos === null) {
            showMessage('🔤 Сначала добавьте новую букву (нажмите на пустую клетку рядом с буквами)', 1300);
            return;
        }
        if (selectedCells.length === 0) {
            showMessage('👆 Проведите слово, выбрав последовательность клеток с буквами', 1200);
            return;
        }
        const word = getCurrentWordFromPath();
        if (word === '') {
            showMessage('❗ Не удалось составить слово из выбранных клеток', 1000);
            return;
        }
        
        // валидация доверительная, но проверяем уникальность и наличие новой буквы
        if (!validateWord(word, lastPlacedLetterPos)) {
            return;
        }
        
        // начисление очков = длине слова
        const points = word.length;
        scores[currentPlayer] += points;
        // добавляем слово в список использованных
        usedWordsSet.add(word);
        
        // успех!
        showMessage(`✅ Игрок ${getCurrentPlayerName()} составил слово "${word}" и получил ${points} очков!`, 1800);
        
        // обновляем счёт и списки
        updateUI_players();
        updateUsedWordsList();
        
        // проверка окончания игры: все ли клетки заполнены?
        let allFilled = true;
        for (let i=0;i<ROWS;i++) {
            for (let j=0;j<COLS;j++) {
                if (grid[i][j] === null) allFilled = false;
            }
        }
        if (allFilled) {
            allCellsFilled = true;
            let winnerMsg = '';
            if (scores[0] > scores[1]) winnerMsg = `🏆 Победил ${getPlayerName(0)}! 🏆`;
            else if (scores[1] > scores[0]) winnerMsg = `🏆 Победил ${getPlayerName(1)}! 🏆`;
            else winnerMsg = `🤝 Ничья! ${scores[0]} : ${scores[1]}`;
            showMessage(`🎉 Игра окончена! Все клетки заполнены. ${winnerMsg}`, 4000);
            submitBtn.disabled = true;
            return;
        }
        
        // переход хода
        currentPlayer = currentPlayer === 0 ? 1 : 0;
        // очищаем состояние выбора и новую букву для следующего хода
        resetTurnSelection();
        lastPlacedLetterPos = null;
        selectedCells = [];
        renderBoard();
        updateUI_players();
        // дополнительно, если ход следующего игрока, но нет доступных клеток для добавления? (редко , в балде почти всегда есть)
        const availableNow = getAvailableForLetterCells();
        if (availableNow.length === 0 && !allCellsFilled) {
            // случай блокировки (формально не должно быть, но обработаем)
            showMessage('⚠️ Нет доступных клеток для добавления буквы — игра закончена досрочно', 2000);
            allCellsFilled = true;
        }
    }
    
    function getCurrentPlayerName() {
        return currentPlayer === 0 ? (p1NameInput.value.trim() || 'Игрок А') : (p2NameInput.value.trim() || 'Игрок Б');
    }
    function getPlayerName(idx) {
        return idx === 0 ? (p1NameInput.value.trim() || 'Игрок А') : (p2NameInput.value.trim() || 'Игрок Б');
    }
    
    function showMessage(msg, duration = 1500) {
        infoMsgDiv.innerText = msg;
        setTimeout(() => {
            if (infoMsgDiv.innerText === msg) {
                if (!allCellsFilled) infoMsgDiv.innerText = '🔥 Игроки по очереди: добавить 1 букву → провести слово → подтвердить';
                else infoMsgDiv.innerText = '🏁 Игра завершена, нажмите "Сбросить игру"';
            }
        }, duration);
    }
    
    // сброс всей игры
    function resetGame() {
        // пересоздаём поле
        grid = [
            [null, null, null],
            [null, null, null],
            [null, null, null]
        ];
        grid[1][0] = 'Л';
        grid[1][1] = 'Е';
        grid[1][2] = 'С';
        scores = [0, 0];
        usedWordsSet.clear();
        currentPlayer = 0;
        allCellsFilled = false;
        lastPlacedLetterPos = null;
        selectedCells = [];
        submitBtn.disabled = false;
        updateUI_players();
        updateUsedWordsList();
        resetTurnSelection();
        renderBoard();
        showMessage('🔄 Игра перезапущена! Начальное слово ЛЕС в центре. Первый ход — добавляем букву.', 2000);
    }
    
    // очистка текущего выбранного пути (но без отката добавленной буквы)
    function clearCurrentPath() {
        if (lastPlacedLetterPos !== null) {
            // нельзя удалить букву, только путь обнуляем, но можно перевыбрать путь
            selectedCells = [{ row: lastPlacedLetterPos.row, col: lastPlacedLetterPos.col }];
            renderBoard();
            updateCurrentWordDisplay();
            showMessage('🧹 Путь очищен, начните выбор с новой буквы.', 1000);
        } else {
            showMessage('Нет активной новой буквы, чтобы очистить путь', 800);
        }
    }
    
    // Инициализация событий
    function bindEvents() {
        submitBtn.addEventListener('click', confirmWord);
        clearBtn.addEventListener('click', clearCurrentPath);
        // добавим кнопку сброса в интерфейс? она была в кнопках но не хватало сброса, добавим отдельную кнопку вниз?
        const resetBtn = document.createElement('button');
        resetBtn.innerText = '🔄 Сбросить игру';
        resetBtn.className = 'btn btn-reset';
        resetBtn.style.marginTop = '8px';
        resetBtn.addEventListener('click', resetGame);
        const buttonsContainer = document.querySelector('.action-buttons');
        buttonsContainer.appendChild(resetBtn);
        // также можно учитывать смену имён без проблем
    }
    
    // запуск
    function init() {
        renderBoard();
        updateUI_players();
        updateUsedWordsList();
        bindEvents();
        resetTurnSelection();
        lastPlacedLetterPos = null;
    }
    
    init();
</script>
</body>
</html>
